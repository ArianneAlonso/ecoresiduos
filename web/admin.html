<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <link rel="stylesheet" href="src/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <header class="bg-blue-600 text-white p-4 flex justify-between items-center">
    <h1 id="welcomeAdmin" class="text-xl font-bold">Bienvenido, Admin</h1>

    <nav class="space-x-4 flex items-center">
      <a href="dashboard.html" class="hover:underline">Dashboard</a>
      <a href="admin-events.html" class="hover:underline">Eventos</a>
      <a href="profile.html" class="hover:underline">Ecopuntos</a>
      <a href="rutas.html" class="hover:underline">Rutas</a>
      <a href="contenedores.html" class="hover:underline">Contenedores</a>
     

      <button id="logoutBtn" 
              class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded ml-4">
        Cerrar sesión
      </button>
    </nav>
  </header>

  <main class="p-6 space-y-10">

    <div id="mensajeError"
         class="hidden mb-4 p-2 bg-red-200 text-red-800 rounded">
    </div>

    <!-- USUARIOS -->
    <section id="usuariosSection">
      <h2 class="text-2xl font-bold mb-4">Gestión de Usuarios</h2>

      <div class="bg-white p-4 rounded shadow overflow-x-auto">
        <table class="w-full table-auto">
          <thead class="bg-gray-200">
            <tr>
              <th class="border px-4 py-2">Nombre</th>
              <th class="border px-4 py-2">Email</th>
              <th class="border px-4 py-2">Rol</th>
            </tr>
          </thead>

          <tbody id="userTable"></tbody>
        </table>
      </div>
    </section>

  </main>

  <script type="module" src="src/admin.js"></script>

</body>
</html>
