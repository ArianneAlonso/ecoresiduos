<!DOCTYPE html>
<html lang="es" class="light">
<head>
  <meta charset="UTF-8" />
  <title>Panel de Eventos</title>
  <link rel="stylesheet" href="src/style.css">

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 dark:text-gray-200">

  <!-- NAVBAR -->
  <nav class="w-full bg-green-700 text-white px-6 py-4 flex justify-between items-center shadow-md">
    <h1 class="text-xl font-bold">Sistema de Reciclaje</h1>

    <!-- Enlaces -->
    <div class="hidden md:flex items-center gap-6 font-medium">
      <a href="admin.html" class="hover:text-green-200 transition">Inicio</a>
      <a href="/dashboard.html" class="hover:text-green-200 transition">Dashboard</a>
      <a href="/admin-events.html" class="hover:text-green-200 transition">Eventos</a>
      <a href="/rutas.html" class="hover:text-green-200 transition">Rutas</a>
      <a href="/contenedores.html" class="hover:text-green-200 transition">Contenedores</a>
      
    </div>

    <div class="flex items-center gap-4">
      <button id="toggleDark"
        class="py-1 px-3 bg-white text-gray-900 rounded shadow">
        🌓 Modo
      </button>

      <button onclick="logout()"
        class="py-1 px-3 bg-red-600 hover:bg-red-700 rounded text-white">
        Cerrar sesión
      </button>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto mt-6 p-4">

    <!-- FORM -->
    <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow">
      <h2 class="text-xl font-bold mb-4">Crear / Editar Evento</h2>

      <form id="eventoForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input type="hidden" id="idEvento" />

        <input id="nombre" placeholder="Nombre" class="input" required />
        <input id="descripcion" placeholder="Descripción" class="input" />
        <input type="date" id="fecha" class="input" required />
        <input type="number" id="puntosOtorgados" placeholder="Puntos" class="input" required />
        <input id="latitud" placeholder="Latitud" class="input" readonly />
        <input id="longitud" placeholder="Longitud" class="input" readonly />
      </form>

      <div class="mt-4">
        <h3 class="font-semibold mb-1">Seleccionar ubicación</h3>
        <div id="map" class="w-full h-72 rounded-lg shadow"></div>
      </div>

      <button onclick="guardarEvento()"
        class="mt-4 w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded">
        Guardar Evento
      </button>
    </div>

    <!-- TABLA -->
    <div class="mt-8 bg-white dark:bg-gray-800 p-6 rounded-lg shadow">
      <h2 class="text-xl font-bold mb-4">Eventos Registrados</h2>

      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-gray-200 dark:bg-gray-700">
            <th class="p-2">ID</th>
            <th class="p-2">Nombre</th>
            <th class="p-2">Fecha</th>
            <th class="p-2">Lat</th>
            <th class="p-2">Lng</th>
            <th class="p-2">Acciones</th>
          </tr>
        </thead>
        <tbody id="eventosBody"></tbody>
      </table>
    </div>
  </div>

  <!-- MODAL ELIMINAR -->
  <div id="modalEliminar"
    class="fixed inset-0 backdrop-blur-sm hidden items-center justify-center z-50">

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-96 p-6">
      <h2 class="text-lg font-bold mb-4">Confirmar eliminación</h2>
      <p class="mb-4">¿Seguro que deseas eliminar este evento?</p>

      <div class="flex justify-end gap-3">
        <button id="cancelarEliminar"
          class="px-4 py-2 bg-gray-300 rounded">
          Cancelar
        </button>

        <button id="confirmarEliminar"
          class="px-4 py-2 bg-red-600 text-white rounded">
          Eliminar
        </button>
      </div>
    </div>
  </div>

  <!-- MODAL USUARIOS -->
  <div id="modalUsuarios"
    class="fixed inset-0 backdrop-blur-sm hidden items-center justify-center z-50">

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-96 p-6">
      <h2 class="text-lg font-bold mb-4">Usuarios inscriptos</h2>

      <ul id="listaUsuarios" class="text-sm space-y-2"></ul>

      <div class="flex justify-end mt-4">
        <button onclick="cerrarModalUsuarios()"
          class="px-4 py-2 bg-gray-500 text-white rounded">
          Cerrar
        </button>
      </div>
    </div>
  </div>

  <script src="./src/admin-events.js"></script>

  <script>
    document.getElementById("toggleDark").addEventListener("click", () => {
      document.documentElement.classList.toggle("dark");
    });
  </script>

</body>
</html>
