<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mis Entregas</title>
 
</head>
<body class="bg-gray-100 p-6">

  <div class="max-w-5xl mx-auto bg-white shadow-lg rounded-lg p-6">

    <h1 class="text-2xl font-bold mb-4">📦 Mis Entregas</h1>

    <!-- BOTÓN NUEVA SOLICITUD -->
    <button
      id="btnMostrarForm"
      class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded mb-4"
    >
      ➕ Solicitar Retiro
    </button>

    <!-- FORMULARIO -->
    <div id="formularioContainer" class="hidden mb-6 border p-4 rounded bg-gray-50">
      <h2 class="text-lg font-semibold mb-3">Nueva Solicitud</h2>

      <form id="formEntrega" class="space-y-3">

        <div>
          <label class="block font-medium">Materiales</label>
          <div class="flex gap-4 mt-1">
            <label><input type="checkbox" value="Plástico" /> Plástico</label>
            <label><input type="checkbox" value="Vidrio" /> Vidrio</label>
            <label><input type="checkbox" value="Cartón" /> Cartón</label>
            <label><input type="checkbox" value="Metal" /> Metal</label>
          </div>
        </div>

        <div>
          <label class="block font-medium">Tipo de envase</label>
          <select id="tipoEnvase" class="border p-2 rounded w-full">
            <option value="bolsa-consorcio">Bolsa Consorcio</option>
            <option value="caja">Caja</option>
            <option value="bolsa-chica">Bolsa chica</option>
          </select>
        </div>

        <div>
          <label class="block font-medium">Dirección</label>
          <input type="text" id="direccion" class="border p-2 rounded w-full" required />
        </div>

        <div>
          <label class="block font-medium">Horario Preferencia</label>
          <select id="horario" class="border p-2 rounded w-full">
            <option value="lunes-mañana">Lunes mañana</option>
            <option value="martes-tarde">Martes tarde</option>
            <option value="miercoles-mañana">Miércoles mañana</option>
          </select>
        </div>

        <div class="flex gap-2">
          <button type="submit"
            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">
            Enviar Solicitud
          </button>

          <button type="button"
            id="btnCancelar"
            class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded">
            Cancelar
          </button>
        </div>

      </form>
    </div>

    <!-- TABLA -->
    <table class="w-full border-collapse">
      <thead>
        <tr class="bg-gray-200">
          <th class="p-2 text-left">Fecha</th>
          <th class="p-2 text-left">Materiales</th>
          <th class="p-2 text-left">Dirección</th>
          <th class="p-2 text-left">Estado</th>
        </tr>
      </thead>
      <tbody id="tablaEntregas"></tbody>
    </table>

  </div>

  <!-- JS SEPARADO -->
  <script type="module" src="src/entregas_usuario.js"></script>

</body>
</html>
