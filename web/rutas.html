<!DOCTYPE html>
<html lang="es" class="light">
<head>
  <meta charset="UTF-8">
  <title>Panel de Rutas</title>

  <!-- Tailwind (si lo usás desde style.css compilado) -->
  <link rel="stylesheet" href="src/style.css">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    #map {
      height: 400px;
    }
  </style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-200 min-h-screen">

  <!-- NAVBAR -->
  <nav class="bg-green-700 dark:bg-green-800 text-white px-6 py-4 shadow">
    
    <div class="flex justify-between items-center">

      <!-- Logo -->
      <h1 class="text-xl font-bold flex items-center gap-2">
        ♻️ EcoResiduos
      </h1>

      <!-- Enlaces -->
      <div class="hidden md:flex items-center gap-6 font-medium">

        <a href="dashboard.html" class="hover:underline hover:text-green-200 transition">
          Dashboard
        </a>

        <a href="admin-events.html" class="hover:underline hover:text-green-200 transition">
          Eventos
        </a>

        <a href="profile.html" class="hover:underline hover:text-green-200 transition">
          Ecopuntos
        </a>

        <a href="rutas.html" class="underline font-semibold text-yellow-300">
          Rutas
        </a>

        <a href="contenedores.html" class="hover:underline hover:text-green-200 transition">
          Contenedores
        </a>

        

      </div>

      <!-- Botones -->
      <div class="flex items-center gap-4">

        <button id="toggleDark"
          class="py-1 px-3 bg-white text-gray-900 dark:bg-gray-700 dark:text-white rounded shadow">
          🌓
        </button>

      <!-- Botón logout -->
      <button
        id="logoutBtn"
        class="bg-red-500 hover:bg-red-600 dark:bg-red-600 dark:hover:bg-red-700 px-4 py-2 rounded text-white"
      >
        Cerrar sesión
      </button>

    </div>

  </nav>

  <!-- CONTENIDO -->
  <main class="max-w-7xl mx-auto mt-8 bg-white dark:bg-gray-800 p-6 rounded shadow">

    <h2 class="text-2xl font-semibold mb-4">
      📦 Listado de Entregas
    </h2>

    <!-- TABLA -->
    <div class="overflow-x-auto">
      <table class="w-full table-auto border border-gray-300 dark:border-gray-600">
        <thead class="bg-gray-200 dark:bg-gray-700">
          <tr>
            <th class="p-2">ID</th>
            <th class="p-2">Usuario</th>
            <th class="p-2">Materiales</th>
            <th class="p-2">Dirección</th>
            <th class="p-2">Latitud</th>
            <th class="p-2">Longitud</th>
            <th class="p-2">Estado</th>
            <th class="p-2">Acciones</th>
          </tr>
        </thead>
        <tbody id="tbodyEntregas"></tbody>
      </table>
    </div>

    <!-- MAPA -->
    <h2 class="text-2xl font-semibold mt-10 mb-4">
      🗺 Mapa de Entregas
    </h2>

    <div
      id="map"
      class="w-full rounded border border-gray-300 dark:border-gray-600"
    ></div>

  </main>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
  </script>

  <!-- TU JS -->
  <script type="module" src="./src/rutas.js"></script>

</body>
</html>
