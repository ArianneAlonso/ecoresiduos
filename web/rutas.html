<!DOCTYPE html>
<html lang="es" class="light">
<head>
  <meta charset="UTF-8">
  <title>Panel de Confirmación</title>
  <link rel="stylesheet" href="src/style.css">
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-200 min-h-screen">

  <nav class="bg-green-700 text-white p-4 flex justify-between">
    <h1 class="text-xl font-bold">🛠 Registrar entregas</h1>
    <button id="logoutBtn" class="bg-red-500 px-3 py-1 rounded">
      Cerrar sesión
    </button>
  </nav>

  <main class="max-w-6xl mx-auto mt-8 bg-white dark:bg-gray-800 p-6 rounded shadow">

    <h2 class="text-2xl font-semibold mb-4">
      Entregas Pendientes
    </h2>

    <div class="overflow-x-auto">
      <table class="w-full table-auto border border-gray-300 dark:border-gray-600">
        <thead class="bg-gray-200 dark:bg-gray-700">
          <tr>
            <th class="p-2">ID</th>
            <th class="p-2">Usuario</th>
            <th class="p-2">Materiales</th>
            <th class="p-2">Dirección</th>
            <th class="p-2">Estado</th>
            <th class="p-2">Acciones</th>
          </tr>
        </thead>
        <tbody id="tbodyEntregas"></tbody>
      </table>
    </div>

  </main>

  <script type="module" src="./src/rutas.js"></script>
</body>
</html>
