<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Perfil - EcoResiduos</title>
  <link rel="icon" type="image/png" href="./assets/favicon.png" />
  <link rel="stylesheet" href="/src/style.css">

  <!-- 🔥 Evita flash blanco -->
  <script>
    const theme = localStorage.getItem("theme");
    if (theme === "dark") {
      document.documentElement.classList.add("dark");
    }
  </script>
</head>

<body class="flex flex-col min-h-screen bg-green-50 text-gray-800 dark:bg-gray-900 dark:text-white transition-colors duration-300">

  <!-- NAVBAR -->
  <nav class="bg-white dark:bg-gray-800 shadow-md px-6 py-4 flex justify-between items-center sticky top-0 z-20 transition-colors">

    <div class="flex items-center space-x-3">
      <img src="../assets/logo.png" alt="logo" class="w-8 h-8">
      <span class="text-2xl font-bold text-green-600 dark:text-green-400">
        EcoResiduos
      </span>
    </div>

    <div class="flex items-center space-x-4">

      <ul class="hidden md:flex space-x-6 font-semibold items-center">
        <li><a href="index.html" class="hover:text-green-900 dark:hover:text-green-400">Inicio</a></li>
        <li><a href="mapa.html" class="hover:text-green-900 dark:hover:text-green-400">Mapa</a></li>
        <li><a href="estadistica.html" class="hover:text-green-900 dark:hover:text-green-400">Estadísticas</a></li>
        <li><a href="consejos.html" class="hover:text-green-900 dark:hover:text-green-400">Consejos</a></li>
        <li><a href="entregas_usuarios.html" class="hover:text-green-900 dark:hover:text-green-400">Entregas</a></li>
        <li><a href="perfil.html" class="text-green-900 dark:text-green-400 font-bold">Perfil</a></li>
      </ul>

      <!-- 🌙 BOTÓN MODO OSCURO -->
      <button
        id="toggleDark"
        class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition">
        <i data-lucide="moon"></i>
      </button>

      <!-- 🔴 CERRAR SESIÓN -->
      <button id="logoutBtn"
        class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition font-semibold shadow-md">
        Cerrar sesión
      </button>

    </div>
  </nav>

  <!-- PERFIL -->
  <main class="flex-1 max-w-5xl mx-auto px-6 py-10 w-full">
    <section class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-md text-center transition-colors">

      <h2 class="text-3xl font-bold text-green-700 dark:text-green-400 mb-4">
        👤 Mi Perfil
      </h2>

      <div id="perfilContainer"></div>

      <!-- Logros -->
      <section class="mt-10 text-left">
        <h3 class="text-2xl font-semibold text-green-700 dark:text-green-400 mb-4">
          🏅 Logros e Insignias
        </h3>
        <div id="logrosContainer"
             class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      </section>

    </section>
  </main>

  <!-- FOOTER -->
  <footer class="bg-green-700 text-white py-8 mt-auto">
    <div class="max-w-6xl mx-auto px-6 grid md:grid-cols-3 gap-6">
      <div>
        <h3 class="font-bold text-lg">EcoResiduos</h3>
        <p class="text-sm text-green-100 mt-2">
          Plataforma dedicada a fomentar el reciclaje y la economía circular.
        </p>
      </div>

      <div>
        <h4 class="font-semibold">Enlaces</h4>
        <ul class="text-sm mt-2 space-y-1">
          <li><a href="./mapa.html" class="hover:underline">Mapa</a></li>
          <li><a href="./estadistica.html" class="hover:underline">Estadísticas</a></li>
        </ul>
      </div>

      <div>
        <h4 class="font-semibold">Contacto</h4>
        <p class="text-sm mt-2">contacto@ecoresiduos.dev</p>
      </div>
    </div>

    <div class="mt-6 text-center text-green-200 text-sm">
      © 2025 EcoResiduos
    </div>
  </footer>

  <script type="module" src="./src/perfil.js"></script>
</body>
</html>
